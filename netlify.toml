# Monorepo: build the frontend workspace. Netlify runs from this base dir.
[build]
base = "apps/web"
command = "pnpm install && pnpm build"
publish = "dist"

# Proxy API calls to the backend. Update the target to your deployed API
# Gateway URL (see apps/api).
[[redirects]]
from = "/api/*"
to = "https://quizaroni-api.onrender.com/api/:splat"
status = 200

# SPA fallback.
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Never let the browser HTTP-cache the service worker or manifest, so SW
# updates (and the asset cache-bust they trigger) reach returning visitors
# promptly instead of being served stale.
[[headers]]
for = "/sw.js"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/manifest.json"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
