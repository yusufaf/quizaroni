# Monorepo: build the frontend workspace. Netlify runs from this base dir.
[build]
base = "apps/web"
command = "pnpm install && pnpm build"
publish = "dist"

# Inject per-set Open Graph / Twitter meta into public study-set pages so
# shared links unfurl richly and search engines get real snippets. Runs before
# redirects; falls back to the default shell for private/unknown sets.
# (Source: apps/web/netlify/edge-functions/og-meta.ts — base dir is apps/web.)
[[edge_functions]]
path = "/view/*"
function = "og-meta"

# Dynamic XML sitemap of all public study sets (linked from robots.txt), so
# public pages are discoverable/indexable. Source:
# apps/web/netlify/edge-functions/sitemap.ts.
[[edge_functions]]
path = "/sitemap.xml"
function = "sitemap"

# Proxy API calls to the backend. NOTE: the running web app calls the AWS API
# Gateway directly via BASE_API_URL (apps/web/src/state/api/awsAPI.ts), so this
# onrender proxy is currently unused — update or remove it to match your
# deployed backend (see apps/api).
[[redirects]]
from = "/api/*"
to = "https://quizaroni-api.onrender.com/api/:splat"
status = 200

# SPA fallback.
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Never let the browser HTTP-cache the service worker or manifest, so SW
# updates (and the asset cache-bust they trigger) reach returning visitors
# promptly instead of being served stale.
[[headers]]
for = "/sw.js"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/manifest.json"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
