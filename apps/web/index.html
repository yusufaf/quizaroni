<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Quizaroni turns any topic into flashcards you'll actually enjoy studying. Create study sets, study with 5 modes and spaced repetition, and share publicly — free forever."
        />
        <meta name="theme-color" content="#2b2b2b" />

        <!-- Default Open Graph / Twitter tags (app shell). Per-public-set pages
             should override og:title/description/image/url dynamically. -->
        <link rel="canonical" href="https://quizaroni.netlify.app/" />
        <meta property="og:site_name" content="Quizaroni" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://quizaroni.netlify.app/" />
        <meta
            property="og:title"
            content="Quizaroni — Learn anything. Remember everything."
        />
        <meta
            property="og:description"
            content="Turn any topic into flashcards you'll actually enjoy studying. 5 study modes, spaced repetition, and public sharing — free forever."
        />
        <!-- TODO(B3): replace with a branded 1200x630 og-image.png and switch
             twitter:card to summary_large_image. -->
        <meta
            property="og:image"
            content="https://quizaroni.netlify.app/icon-512x512.png"
        />
        <meta property="og:image:width" content="512" />
        <meta property="og:image:height" content="512" />
        <meta name="twitter:card" content="summary" />
        <meta
            name="twitter:title"
            content="Quizaroni — Learn anything. Remember everything."
        />
        <meta
            name="twitter:description"
            content="Turn any topic into flashcards you'll actually enjoy studying. 5 study modes, spaced repetition, and public sharing — free forever."
        />
        <meta
            name="twitter:image"
            content="https://quizaroni.netlify.app/icon-512x512.png"
        />
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="/favicon-16x16.png"
        />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <!-- Web App manifest -->
        <link rel="manifest" href="/manifest.json" />
        <title>Quizaroni</title>
        <script type="module" src="/src/index.tsx"></script>
    </head>

    <body>
        <div id="root"></div>
    </body>
</html>
