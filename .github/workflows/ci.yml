name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Build frontend
        run: pnpm build:web
      - name: Build backend
        run: pnpm build:api
      - name: Synthesize CDK template
        run: pnpm synth:api
        env:
          account: "000000000000"
          region: us-west-2
          appName: quizaroni
          deploymentType: development
