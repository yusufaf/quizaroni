name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No `version:` here on purpose — action-setup reads the pnpm version from
      # the root package.json "packageManager" field. Specifying both errors with
      # ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build frontend
        run: pnpm build:web
      - name: Build backend
        run: pnpm build:api
      - name: Synthesize CDK template
        run: pnpm synth:api
        env:
          account: "000000000000"
          region: us-west-2
          appName: quizaroni
          deploymentType: development
